apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-recommender-api
  namespace: recipe-recommender
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recipe-recommender-api
  template:
    metadata:
      labels:
        app: recipe-recommender-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: recipe-recommender:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "uvicorn", "app.api.main:app"]
          args: ["--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: recipe-recommender-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
