apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-recommender-ui
  namespace: recipe-recommender
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recipe-recommender-ui
  template:
    metadata:
      labels:
        app: recipe-recommender-ui
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui
          image: recipe-recommender:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              name: http
          volumeMounts:
            - name: streamlit-secrets
              mountPath: /app/.streamlit/secrets.toml
              subPath: secrets.toml
          envFrom:
            - configMapRef:
                name: recipe-recommender-config
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: streamlit-secrets
          secret:
            secretName: recipe-recommender-streamlit-secrets
