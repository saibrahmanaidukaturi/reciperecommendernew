apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: recipe-recommender
  namespace: recipe-recommender
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: recipe-recommender-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: recipe-recommender-ui
                port:
                  number: 80
